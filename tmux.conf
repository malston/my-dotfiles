#-------~---~----------~----------~----
# KEYBINDS
#-------~---~----------~----------~----
unbind C-b
set -g prefix C-b
bind C-b send-prefix

# Use zsh (your actual shell)
set-option -g default-shell "/bin/zsh"
set-option -g default-command "/bin/zsh -l"

# Modern terminal settings
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# Set XTerm key bindings
setw -g xterm-keys on

# Configure escape for Neovim
set-option -sg escape-time 10

# Status line
set -g status-right "%H:%M"
set -g window-status-current-style "underscore"

# If running inside tmux ($TMUX is set), then change the status line to red
%if #{TMUX}
set -g status-bg red
%endif

# No bells
set -g bell-action none

# Keep windows around after exit
set -g remain-on-exit on

# Enable Mouse
set -g mouse on
unbind -n MouseDrag1Pane
unbind -Tcopy-mode MouseDrag1Pane

# Window size toggle
bind F set -w window-size

# Activity monitoring and pane sync
bind m set monitor-activity
bind y set synchronize-panes\; display 'synchronize-panes #{?synchronize-panes,on,off}'

# Create default sessions
new -d -s0 -nirssi 'exec irssi'
set -t0:0 monitor-activity on
set -t0:0 aggressive-resize on
neww -d -ntodo 'exec emacs ~/TODO'
setw -t0:1 aggressive-resize on
neww -d -nmutt 'exec mutt'
setw -t0:2 aggressive-resize on
neww -d
neww -d
neww -d

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# New window with current path
bind c neww -c "#{pane_current_path}"

# Toggle statusbar
bind t set status

# Split windows
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Arrow key pane navigation
unbind Left
unbind Down
unbind Up
unbind Right
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Resizing panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 6

set-option -g renumber-windows on

# Vi keys
set -g status-keys vi
setw -g mode-keys vi

# Copy mode bindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

# Shorter command delay
set -sg escape-time 1

#-------~---~----------~----------~----
# WINDOWS & PANES
#-------~---~----------~----------~----
set -g base-index 1
setw -g pane-base-index 1

setw -g automatic-rename on
set -g display-panes-time 1000

#-------~---~----------~----------~----
# MISC SETTINGS
#-------~---~----------~----------~----
set -g set-titles on
set -g set-titles-string 'tmux: #T'
set -g repeat-time 1000
set -s escape-time 0
setw -g monitor-activity on
set -g history-limit 20000

#-------~---~----------~----------~----
# COLORS (Modern syntax)
#-------~---~----------~----------~----
# Pane borders
set -g pane-border-style fg=blue
set -g pane-active-border-style fg=blue
set -g display-panes-colour white
set -g display-panes-active-colour red

#-------~---~----------~----------~----
# STATUS & MESSAGE (Modern syntax)
#-------~---~----------~----------~----
set -g status-justify right
set -g status-style bg=default,fg=default
set -g status-interval 5

# Message styling
set -g message-style bg=yellow,fg=black,bold

# Window status
setw -g window-status-style fg=red
setw -g window-status-format '#[fg=red] #I #[fg=white] #W#F '
setw -g window-status-current-style fg=black,bg=green,none
setw -g window-status-current-format '#[fg=default] #I #[fg=black] #W#F '

# Status left/right
set -g status-left '#[fg=red][tmux] #[fg=blue]#(whoami)@#(hostname)'
set -g status-left-length 40
set -g status-right ''